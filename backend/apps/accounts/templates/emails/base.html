<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ site_name }}</title>
  </head>
  <body style="margin:0;padding:0;background:#0f1220;color:#e8ebf9;font-family:Arial,sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:24px 12px;">
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="100%"
            cellspacing="0"
            cellpadding="0"
            style="max-width:560px;background:#161b2f;border:1px solid #28304d;border-radius:12px;overflow:hidden;"
          >
            <tr>
              <td style="padding:20px 24px;border-bottom:1px solid #28304d;">
                <div style="font-size:20px;font-weight:700;letter-spacing:0.2px;">{{ site_name }}</div>
              </td>
            </tr>
            <tr>
              <td style="padding:24px;font-size:15px;line-height:1.6;">
                {% block content %}{% endblock %}
              </td>
            </tr>
            <tr>
              <td style="padding:16px 24px;border-top:1px solid #28304d;color:#a5b0d6;font-size:12px;">
                Need help? Contact {{ support_email }}
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
