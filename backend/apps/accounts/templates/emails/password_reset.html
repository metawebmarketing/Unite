{% extends "emails/base.html" %}
{% block content %}
<h1 style="margin:0 0 12px;font-size:22px;line-height:1.3;">Reset your password</h1>
<p style="margin:0 0 18px;">We received a request to reset your {{ site_name }} password.</p>
<p style="margin:0 0 20px;">
  <a
    href="{{ reset_url }}"
    style="display:inline-block;background:#4f7cff;color:#ffffff;text-decoration:none;padding:10px 16px;border-radius:8px;font-weight:600;"
  >
    Reset password
  </a>
</p>
<p style="margin:0 0 8px;">If the button does not work, use this link:</p>
<p style="margin:0 0 20px;word-break:break-all;">
  <a href="{{ reset_url }}" style="color:#86a5ff;">{{ reset_url }}</a>
</p>
<p style="margin:0;color:#a5b0d6;">If you did not request this, you can ignore this email.</p>
{% endblock %}
